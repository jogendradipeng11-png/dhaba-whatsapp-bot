name: Deploy Dhaba WhatsApp Bot

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci   # faster and cleaner than npm install

      - name: Start Dhaba WhatsApp Bot
        run: node index.js
        env:
          # Add any environment variables if needed later
          NODE_ENV: production
        # This keeps the action running (no timeout for long-running bot)
        continue-on-error: true   # Prevents immediate failure
