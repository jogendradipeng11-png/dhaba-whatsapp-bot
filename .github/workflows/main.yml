name: Dhaba-WhatsApp-Bot

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "❌ Error: RENDER_DEPLOY_HOOK_URL secret is not set in GitHub!"
            exit 1
          fi
          echo "🚀 Triggering deploy on Render..."
          curl -X POST "$DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            -d '{"status": "triggered"}'
      
      - name: Done
        run: echo "✅ Render deployment triggered successfully! Check Render Logs for QR code."
