name: Dhaba-WhatsApp-Bot

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deployment
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "❌ RENDER_DEPLOY_HOOK_URL secret is missing!"
            exit 1
          fi
          echo "🚀 Triggering deployment on Render..."
          curl -X POST "$DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            -d '{"status": "triggered"}'
      
      - name: Deployment Triggered
        run: echo "✅ Render deployment triggered. Check your Render dashboard logs for QR code and bot status."
