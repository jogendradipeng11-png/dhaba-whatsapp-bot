name: Deploy Dhaba WhatsApp Bot

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Chrome (required for puppeteer)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Start Dhaba Bot
        run: node index.js
        continue-on-error: true   # Prevents immediate failure
        timeout-minutes: 60       # Give more time to scan QR
